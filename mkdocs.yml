site_name: mem0-go
site_description: Go client SDK for mem0 - the AI memory layer
site_url: https://plexusone.github.io/mem0-go
repo_url: https://github.com/plexusone/mem0-go
repo_name: plexusone/mem0-go

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # Dark mode first (PlexusOne default)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

extra_css:
  - https://plexusone.dev/css/plexusone-mkdocs.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - OmniMemory Provider: omnimemory.md
  - API Reference: https://pkg.go.dev/github.com/plexusone/mem0-go
  - Releases:
      - Changelog: releases/changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/plexusone/mem0-go
